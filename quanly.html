<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Quán | Ăn Chay Sài Gòn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        if (sessionStorage.getItem("isAdmin") !== "true") {
            let pass = prompt("🔒 Khu vực Quản trị nội bộ.\nVui lòng nhập mật khẩu để tiếp tục:");
            if (pass === "admin@8899") { 
                sessionStorage.setItem("isAdmin", "true");
            } else {
                alert("❌ Sai mật khẩu!");
                window.location.href = "index.html"; 
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <div class="bg-gray-800 text-white p-4 sticky top-0 z-40 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-screwdriver-wrench mr-2"></i>Quản Lý Hệ Thống</h1>
        <a href="themquan.html" target="_blank" class="bg-green-500 hover:bg-green-600 px-4 py-1.5 rounded-lg text-sm font-bold shadow transition"><i class="fa-solid fa-plus mr-1"></i> Form Đăng Ký</a>
    </div>

    <div class="max-w-4xl mx-auto p-4 mt-4">
        
        <div id="reportSection" class="hidden mb-8">
            <h2 class="text-lg font-bold text-red-600 mb-3"><i class="fa-solid fa-bell mr-2 animate-pulse"></i>Báo cáo từ cộng đồng (<span id="reportCount">0</span>)</h2>
            <div id="reportList" class="space-y-3">
                </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col sm:flex-row justify-between items-center gap-4 border-t-4 border-green-500">
            <h2 class="font-bold text-gray-700">Tổng số: <span id="totalShops" class="text-green-600 text-xl">0</span> quán</h2>
            <div class="relative w-full sm:w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="adminSearch" placeholder="Tìm tên quán..." class="w-full pl-9 pr-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500 hidden">
            <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Đang tải dữ liệu...
        </div>

        <div id="adminShopList" class="space-y-4"></div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden justify-center items-center p-4">
        <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center p-4 border-b bg-gray-50 rounded-t-xl">
                <h3 class="font-bold text-lg text-blue-600"><i class="fa-solid fa-pen-to-square mr-2"></i>Chỉnh sửa thông tin</h3>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-red-500 text-xl px-2"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-1">
                <form id="editForm" class="space-y-4">
                    <input type="hidden" id="editShopId">
                    <input type="hidden" id="editShopStatus"> 
                    
                    <div><label class="block text-sm font-medium mb-1">Tên Quán</label><input type="text" id="editShopName" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Khu vực</label>
                            <select id="editShopCity" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></select>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">SĐT Zalo</label><input type="tel" id="editShopZalo" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    </div>
                    <div><label class="block text-sm font-medium mb-1">Địa chỉ</label><input type="text" id="editShopAddress" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium mb-1">Link Ảnh Bìa</label><input type="url" id="editShopImage" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    
                    <div class="pt-4 border-t mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Danh mục món bán</label>
                        <div class="flex flex-wrap gap-2" id="editCategorySelection">
                            <label class="cursor-pointer"><input type="checkbox" value="cơm chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Cơm chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="cơm tấm chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Cơm tấm chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="cơm chay thập cẩm" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Cơm thập cẩm</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="bánh mì chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Bánh mì chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="bún chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Bún chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="phở chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Phở chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="mì chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Mì chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="hủ tiếu chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Hủ tiếu chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="bánh chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Bánh chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="cafe chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Cafe chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="thực phẩm chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Thực phẩm chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="hoa quả" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Hoa quả</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="rau củ" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Rau củ</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="đồ khô chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Đồ khô chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="gia vị chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Gia vị chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="sườn chay" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Sườn chay</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="đồ chay đông lạnh" class="peer sr-only edit-shop-category"><span class="block px-3 py-1 text-sm bg-gray-50 border rounded-full peer-checked:bg-green-500 peer-checked:text-white transition">Đồ chay đông lạnh</span></label>
                        </div>
                    </div>

                    <div class="pt-4 border-t mt-4">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-medium text-gray-700">Thực đơn (Menu)</label>
                            <button type="button" onclick="addEditMenuItem()" class="text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded font-bold hover:bg-blue-200 transition"><i class="fa-solid fa-plus"></i> Thêm món</button>
                        </div>
                        <div id="editMenuContainer" class="space-y-2"></div>
                    </div>
                </form>
            </div>
            <div class="p-4 border-t bg-gray-50 flex gap-3">
                <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2.5 rounded-lg font-semibold hover:bg-gray-300">Hủy</button>
                <button type="button" onclick="saveEditShop()" id="btnSaveEdit" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 shadow-md">Lưu Thay Đổi</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr8_G-zkKsr7JrI-gXuE6xNIZErYWWiM8",
            authDomain: "anchaysaigon-bd874.firebaseapp.com",
            projectId: "anchaysaigon-bd874",
            storageBucket: "anchaysaigon-bd874.firebasestorage.app",
            messagingSenderId: "584356333421",
            appId: "1:584356333421:web:06a6fec664ef20d9263c64"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allShops = [];

        async function loadCitiesToEditForm() {
            const citySelect = document.getElementById('editShopCity');
            try {
                const q = query(collection(db, "locations"), orderBy("order"));
                const querySnapshot = await getDocs(q);
                citySelect.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const city = doc.data();
                    citySelect.innerHTML += `<option value="${city.slug}">${city.name}</option>`;
                });
            } catch (error) { console.error(error); }
        }

        // ==========================================
        // XỬ LÝ BÁO CÁO CỘNG ĐỒNG
        // ==========================================
        async function loadReports() {
            try {
                const querySnapshot = await getDocs(collection(db, "reports"));
                let reports = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.status === "new") reports.push({ id: doc.id, ...data });
                });
                
                const reportSection = document.getElementById('reportSection');
                const reportList = document.getElementById('reportList');
                document.getElementById('reportCount').innerText = reports.length;

                if (reports.length > 0) {
                    reportSection.classList.remove('hidden');
                    reportList.innerHTML = '';
                    
                    // Sắp xếp báo cáo mới nhất lên đầu
                    reports.sort((a, b) => b.timestamp - a.timestamp); 
                    
                    reports.forEach(report => {
                        const dateObj = new Date(report.timestamp);
                        const timeStr = dateObj.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) + ' - ' + dateObj.toLocaleDateString('vi-VN');
                        
                        reportList.innerHTML += `
                            <div class="bg-red-50 border border-red-200 p-4 rounded-xl flex flex-col md:flex-row justify-between md:items-center gap-3 shadow-sm">
                                <div>
                                    <p class="text-xs text-gray-500 mb-1"><i class="fa-regular fa-clock mr-1"></i> ${timeStr}</p>
                                    <h4 class="font-bold text-gray-800"><span class="text-red-600">Quán bị báo cáo:</span> ${report.shopName}</h4>
                                    <p class="text-sm text-red-700 mt-1 font-medium bg-white inline-block px-2 py-0.5 rounded border border-red-100"><i class="fa-solid fa-circle-exclamation mr-1"></i> ${report.reason}</p>
                                </div>
                                <div class="flex flex-wrap gap-2 mt-2 md:mt-0">
                                    <button onclick="openEditModal('${report.shopId}')" class="bg-white border border-blue-300 text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-semibold transition">
                                        Sửa thông tin
                                    </button>
                                    <button onclick="handleReport('${report.id}', '${report.shopId}', 'hide')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition shadow-sm">
                                        <i class="fa-solid fa-eye-slash mr-1"></i> Ẩn & Đóng BC
                                    </button>
                                    <button onclick="handleReport('${report.id}', '${report.shopId}', 'dismiss')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-lg text-sm font-semibold transition">
                                        <i class="fa-solid fa-check mr-1"></i> Bỏ qua
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    reportSection.classList.add('hidden');
                }
            } catch (error) { console.error("Lỗi tải báo cáo:", error); }
        }

        window.handleReport = async function(reportId, shopId, action) {
            try {
                if (action === 'hide') {
                    if(!confirm("Hành động này sẽ ẨN quán khỏi trang chủ và đánh dấu báo cáo đã xử lý. Tiếp tục?")) return;
                    
                    try { await updateDoc(doc(db, "shops", shopId), { status: 'hidden' }); } 
                    catch(e) { console.warn("Quán không tồn tại hoặc đã xóa."); }
                    
                    await updateDoc(doc(db, "reports", reportId), { status: 'resolved' });
                    
                } else if (action === 'dismiss') {
                    if(!confirm("Đánh dấu báo cáo này là ĐÃ XỬ LÝ (Không ẩn quán)?")) return;
                    await updateDoc(doc(db, "reports", reportId), { status: 'resolved' });
                }
                
                // Tải lại cả báo cáo và danh sách quán
                loadReports();
                loadAdminShops();
            } catch (error) { alert("Lỗi: " + error.message); }
        }

        // ==========================================
        // DANH SÁCH QUÁN BÊN DƯỚI
        // ==========================================
        async function loadAdminShops() {
            document.getElementById('loading').classList.remove('hidden');
            const container = document.getElementById('adminShopList');
            container.innerHTML = '';
            try {
                const querySnapshot = await getDocs(collection(db, "shops"));
                allShops = [];
                querySnapshot.forEach((doc) => allShops.push({ id: doc.id, ...doc.data() }));
                
                // Sắp xếp: Chờ duyệt (trên cùng) -> Đã hiện -> Đã ẩn (dưới cùng)
                allShops.sort((a, b) => {
                    if (a.status === 'pending') return -1;
                    if (b.status === 'pending') return 1;
                    if (a.status === 'hidden') return 1;
                    if (b.status === 'hidden') return -1;
                    return 0;
                });
                
                document.getElementById('totalShops').innerText = allShops.length;
                renderAdminShops(allShops);
            } catch (error) { console.error(error); } 
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function renderAdminShops(shopsToRender) {
            const container = document.getElementById('adminShopList');
            container.innerHTML = '';
            shopsToRender.forEach(shop => {
                const isPending = shop.status === 'pending';
                const isHidden = shop.status === 'hidden';
                
                let statusBadge = '';
                if(isPending) statusBadge = `<span class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-xs font-bold border border-yellow-200">Chờ duyệt</span>`;
                else if(isHidden) statusBadge = `<span class="bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-xs font-bold border border-gray-300">Đã ẩn</span>`;
                else statusBadge = `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-bold border border-green-200">Đã hiện</span>`;
                
                const approveBtn = isPending 
                    ? `<button onclick="changeShopStatus('${shop.id}', '${shop.name}', 'approved')" class="bg-green-500 text-white hover:bg-green-600 px-4 py-2 rounded-lg text-sm font-semibold transition flex-1 sm:flex-none shadow"><i class="fa-solid fa-check mr-1"></i> Duyệt</button>`
                    : '';
                
                let toggleHideBtn = '';
                if(isHidden) {
                    toggleHideBtn = `<button onclick="changeShopStatus('${shop.id}', '${shop.name}', 'approved')" class="bg-green-50 text-green-600 hover:bg-green-600 hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex-1 sm:flex-none"><i class="fa-solid fa-eye mr-1"></i> Mở lại</button>`;
                } else {
                    toggleHideBtn = `<button onclick="changeShopStatus('${shop.id}', '${shop.name}', 'hidden')" class="bg-gray-100 text-gray-600 hover:bg-gray-600 hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex-1 sm:flex-none"><i class="fa-solid fa-eye-slash mr-1"></i> Ẩn</button>`;
                }

                const categoryList = shop.categories ? shop.categories.join(', ') : 'Chưa cập nhật danh mục';

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between hover:shadow-md transition ${isHidden ? 'opacity-50 grayscale-[50%]' : ''}">
                        <div class="flex gap-4 items-center w-full sm:w-auto">
                            <img src="${shop.image}" class="w-16 h-16 rounded-lg object-cover border">
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800 text-lg">${shop.name} ${statusBadge}</h3>
                                <p class="text-xs text-gray-500 truncate w-48 sm:w-64"><i class="fa-solid fa-location-dot mr-1"></i> ${shop.address}</p>
                                <p class="text-xs text-blue-500 mt-1"><i class="fa-solid fa-tags mr-1"></i> ${categoryList}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto justify-end border-t sm:border-t-0 pt-3 sm:pt-0 mt-2 sm:mt-0">
                            ${approveBtn}
                            <button onclick="openEditModal('${shop.id}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex-1 sm:flex-none">Sửa</button>
                            ${toggleHideBtn}
                            <button onclick="deleteShop('${shop.id}', '${shop.name}')" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-3 py-2 rounded-lg text-sm font-semibold transition flex-none" title="Xóa vĩnh viễn"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('adminSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            renderAdminShops(allShops.filter(s => s.name.toLowerCase().includes(val)));
        });

        window.changeShopStatus = async function(shopId, shopName, newStatus) {
            let msg = '';
            if (newStatus === 'hidden') msg = `Bạn có chắc muốn ẨN quán [${shopName}] khỏi trang chủ không?`;
            else msg = `Xác nhận HIỂN THỊ LẠI quán [${shopName}] lên trang chủ?`;

            if(confirm(msg)) {
                await updateDoc(doc(db, "shops", shopId), { status: newStatus });
                loadAdminShops();
            }
        }

        // Nút xóa vĩnh viễn (được làm nhỏ lại bằng icon thùng rác)
        window.deleteShop = async function(shopId, shopName) {
            if(confirm(`⚠️ CẢNH BÁO!\nBạn có chắc chắn muốn XÓA VĨNH VIỄN quán [${shopName}] khỏi cơ sở dữ liệu không?`)) {
                await deleteDoc(doc(db, "shops", shopId));
                loadAdminShops();
            }
        }

        let editItemCount = 0;
        window.openEditModal = function(shopId) {
            const shop = allShops.find(s => s.id === shopId);
            // Nếu bấm sửa từ báo cáo mà không tìm thấy shop trong allShops (có thể do lỗi), báo lỗi
            if(!shop) { alert("Lỗi: Không tìm thấy dữ liệu quán này."); return; }

            document.getElementById('editShopId').value = shop.id;
            document.getElementById('editShopStatus').value = shop.status || "approved"; 
            document.getElementById('editShopName').value = shop.name;
            document.getElementById('editShopCity').value = shop.city;
            document.getElementById('editShopZalo').value = shop.zalo_phone;
            document.getElementById('editShopAddress').value = shop.address;
            document.getElementById('editShopImage').value = shop.image;

            document.querySelectorAll('.edit-shop-category').forEach(cb => cb.checked = false);
            if(shop.categories) {
                shop.categories.forEach(cat => {
                    const checkbox = document.querySelector(`.edit-shop-category[value="${cat}"]`);
                    if(checkbox) checkbox.checked = true;
                });
            }

            const menuContainer = document.getElementById('editMenuContainer');
            menuContainer.innerHTML = ''; editItemCount = 0;
            if(shop.menu && shop.menu.length > 0) {
                shop.menu.forEach(item => addEditMenuItem(item.name, item.price));
            } else {
                addEditMenuItem();
            }

            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }
        
        window.closeEditModal = function() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        window.addEditMenuItem = function(name = '', price = '') {
            editItemCount++;
            document.getElementById('editMenuContainer').insertAdjacentHTML('beforeend', `
                <div class="flex gap-2 bg-white border p-2 rounded edit-menu-row items-center" id="editMenuRow_${editItemCount}">
                    <input type="text" class="edit-menu-name flex-1 px-3 py-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="Tên món" value="${name}" required>
                    <input type="number" class="edit-menu-price w-24 px-3 py-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="Giá" value="${price}" required>
                    <button type="button" onclick="removeEditMenuItem(${editItemCount})" class="text-red-400 hover:text-red-600 px-2 transition"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
                </div>`);
        }
        window.removeEditMenuItem = function(id) { document.getElementById(`editMenuRow_${id}`).remove(); }
        
        window.saveEditShop = async function() {
            const shopId = document.getElementById('editShopId').value;
            const btn = document.getElementById('btnSaveEdit');
            const checkedCategories = Array.from(document.querySelectorAll('.edit-shop-category:checked')).map(cb => cb.value);

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang lưu...';

            try {
                const updatedData = {
                    name: document.getElementById('editShopName').value.trim(),
                    city: document.getElementById('editShopCity').value,
                    zalo_phone: document.getElementById('editShopZalo').value.trim(),
                    address: document.getElementById('editShopAddress').value.trim(),
                    image: document.getElementById('editShopImage').value.trim(),
                    status: document.getElementById('editShopStatus').value,
                    categories: checkedCategories, 
                    menu: []
                };

                document.querySelectorAll('.edit-menu-row').forEach(row => {
                    const mName = row.querySelector('.edit-menu-name').value.trim();
                    const mPrice = parseInt(row.querySelector('.edit-menu-price').value);
                    if (mName && mPrice) updatedData.menu.push({ name: mName, price: mPrice });
                });

                await updateDoc(doc(db, "shops", shopId), updatedData);
                closeEditModal(); 
                loadAdminShops(); 
            } catch(e) {
                alert("Lỗi: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Lưu Thay Đổi';
            }
        }
        
        // Khởi chạy cả 2 bảng: Báo cáo & Danh sách quán
        loadCitiesToEditForm();
        loadReports();
        loadAdminShops();
    </script>
</body>
</html>
