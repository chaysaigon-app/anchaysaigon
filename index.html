        ];

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = "⏳ Đang đẩy dữ liệu...";
            log("Bắt đầu kết nối Firestore...");
            
            let successCount = 0;
            
            for (const shop of shopsData) {
                try {
                    // Firebase: Lưu từng quán vào collection 'shops'
                    await setDoc(doc(db, "shops", shop.id), shop);
                    log(`✅ Đã thêm: ${shop.name}`);
                    successCount++;
                } catch (error) {
                    log(`❌ Lỗi (${shop.name}): ${error.message}`, true);
                }
            }
            
            if (successCount === shopsData.length) {
                log("🎉 HOÀN TẤT! Đã đẩy 20 quán lên Firebase thành công.");
                btn.innerText = "Đã thực hiện xong";
            } else {
                log("⚠️ Có lỗi xảy ra trong quá trình đẩy.", true);
                btn.disabled = false;
                btn.innerText = "Thử lại";
            }
        });
    </script>
