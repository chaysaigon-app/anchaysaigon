<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ăn Chay Sài Gòn - Đặt món chay qua Zalo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #22c55e; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <header class="bg-green-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-leaf mr-2"></i>Ăn Chay Sài Gòn</h1>
            <i class="fa-solid fa-bars text-xl cursor-pointer"></i>
        </div>
        
        <div class="flex gap-2 bg-white p-1 rounded-lg">
            <select id="citySelect" class="bg-transparent text-gray-700 outline-none border-r border-gray-300 px-2 text-sm max-w-[130px] truncate">
                <option value="">Tất cả khu vực</option>
            </select>
            <input type="text" id="searchInput" placeholder="Tìm tên quán, món ăn..." class="w-full px-2 text-gray-700 outline-none text-sm">
            <button class="bg-green-500 text-white px-3 py-1 rounded-md"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>

    <div class="flex overflow-x-auto gap-3 p-4 bg-white shadow-sm hide-scroll" id="categoryTags">
        <button class="filter-btn active px-4 py-1 bg-green-100 text-green-700 rounded-full text-sm font-semibold whitespace-nowrap" data-keyword="">Tất cả</button>
        <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="cơm">Cơm</button>
        <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="bún">Bún / Phở</button>
        <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="lẩu">Lẩu chay</button>
        <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="gỏi">Gỏi / Cuốn</button>
    </div>

    <main class="p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">Quán chay dành cho bạn</h2>
            <span id="shopCount" class="text-sm text-gray-500">Đang tải...</span>
        </div>
        
        <div id="loading" class="flex justify-center items-center py-10">
            <div class="spinner"></div>
            <span class="ml-3 text-gray-500">Đang lấy dữ liệu từ hệ thống...</span>
        </div>

        <div id="shopList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            </div>
    </main>

    <div id="cartBottomBar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] transition-transform duration-300 transform translate-y-full flex justify-between items-center z-50">
        <div>
            <p class="text-xs text-gray-500 mb-1">Đang chọn từ: <span id="cartShopName" class="font-semibold text-gray-700"></span></p>
            <p class="text-xs text-gray-500 mb-1">Tổng đơn (<span id="cartCount">0</span> món)</p>
            <p class="text-xl font-bold text-green-600" id="cartTotal">0đ</p>
        </div>
        <button onclick="checkoutZalo()" class="bg-[#0068FF] hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center shadow-md">
            <i class="fa-solid fa-paper-plane mr-2"></i> Gửi Zalo
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr8_G-zkKsr7JrI-gXuE6xNIZErYWWiM8",
            authDomain: "anchaysaigon-bd874.firebaseapp.com",
            projectId: "anchaysaigon-bd874",
            storageBucket: "anchaysaigon-bd874.firebasestorage.app",
            messagingSenderId: "584356333421",
            appId: "1:584356333421:web:06a6fec664ef20d9263c64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allShops = []; // Biến lưu toàn bộ dữ liệu quán để lọc

        // 1. TẢI DỮ LIỆU ĐỊA LÝ
        async function loadCities() {
            const citySelect = document.getElementById('citySelect');
            try {
                const q = query(collection(db, "locations"), orderBy("order"));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach((doc) => {
                    const city = doc.data();
                    citySelect.innerHTML += `<option value="${city.slug}">${city.name}</option>`;
                });
            } catch (error) { console.error("Lỗi tải thành phố:", error); }
        }

        // 2. TẢI DỮ LIỆU QUÁN & MENU
        async function loadShops() {
            try {
                const querySnapshot = await getDocs(collection(db, "shops"));
                allShops = [];
                querySnapshot.forEach((doc) => allShops.push(doc.data()));
                
                document.getElementById('loading').style.display = 'none';
                renderShops(allShops); // Hiển thị ra màn hình
            } catch (error) {
                console.error("Lỗi tải quán:", error);
                document.getElementById('loading').innerHTML = '<span class="text-red-500">Lỗi kết nối dữ liệu. Vui lòng thử lại.</span>';
            }
        }

        // 3. HIỂN THỊ QUÁN RA MÀN HÌNH
        function renderShops(shopsToRender) {
            const container = document.getElementById('shopList');
            document.getElementById('shopCount').innerText = `${shopsToRender.length} địa điểm`;
            container.innerHTML = '';

            if(shopsToRender.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 col-span-full py-10">Không tìm thấy quán nào phù hợp.</p>';
                return;
            }

            shopsToRender.forEach(shop => {
                // Render Menu Items
                let menuHtml = '';
                if(shop.menu && shop.menu.length > 0) {
                    shop.menu.forEach(item => {
                        menuHtml += `
                            <div class="flex justify-between items-center py-1">
                                <span class="text-sm font-medium text-gray-700 max-w-[65%] truncate" title="${item.name}">${item.name}</span>
                                <button onclick="addToCart('${shop.name}', '${item.name}', ${item.price}, '${shop.zalo_phone}')" 
                                        class="text-green-600 font-bold text-xs bg-green-50 px-2 py-1 rounded-md hover:bg-green-100 transition">
                                    + ${item.price.toLocaleString('vi-VN')}đ
                                </button>
                            </div>
                        `;
                    });
                } else {
                    menuHtml = '<p class="text-xs text-gray-400 italic">Đang cập nhật thực đơn...</p>';
                }

                // Render Shop Card
                const card = `
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-md transition">
                        <img src="${shop.image}" alt="${shop.name}" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-lg text-gray-800 truncate" title="${shop.name}">${shop.name}</h3>
                                <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded shrink-0"><i class="fa-solid fa-star text-yellow-500"></i> Mới</span>
                            </div>
                            <p class="text-gray-500 text-xs mt-1 mb-3 truncate" title="${shop.address}"><i class="fa-solid fa-location-dot mr-1"></i> ${shop.address}</p>
                            
                            <div class="border-t pt-2 space-y-1">
                                ${menuHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // 4. CHỨC NĂNG TÌM KIẾM & LỌC DỮ LIỆU
        function filterData(keyword = '') {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const cityVal = document.getElementById('citySelect').value;
            const tagVal = keyword.toLowerCase();

            const filtered = allShops.filter(shop => {
                // Lọc theo thành phố
                if (cityVal && shop.city !== cityVal) return false;

                // Lọc theo ô tìm kiếm (Tìm trong tên quán, địa chỉ hoặc tên món ăn)
                let matchSearch = true;
                if (searchVal) {
                    const shopContent = (shop.name + " " + shop.address).toLowerCase();
                    const menuContent = shop.menu ? shop.menu.map(m => m.name).join(" ").toLowerCase() : "";
                    matchSearch = shopContent.includes(searchVal) || menuContent.includes(searchVal);
                }

                // Lọc theo Tag (Cơm, bún, lẩu...)
                let matchTag = true;
                if (tagVal) {
                    const menuContent = shop.menu ? shop.menu.map(m => m.name).join(" ").toLowerCase() : "";
                    matchTag = menuContent.includes(tagVal) || shop.name.toLowerCase().includes(tagVal);
                }

                return matchSearch && matchTag;
            });

            renderShops(filtered);
        }

        // Gắn sự kiện lắng nghe tìm kiếm
        document.getElementById('searchInput').addEventListener('input', () => filterData());
        document.getElementById('citySelect').addEventListener('change', () => filterData());
        
        // Gắn sự kiện cho các nút Tag (Cơm, Bún...)
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-green-100', 'text-green-700', 'active');
                    b.classList.add('bg-gray-100', 'text-gray-700');
                });
                e.target.classList.remove('bg-gray-100', 'text-gray-700');
                e.target.classList.add('bg-green-100', 'text-green-700', 'active');
                
                filterData(e.target.dataset.keyword);
            });
        });

        // 5. LOGIC GIỎ HÀNG (Sử dụng window. để HTML gọi được từ xa)
        window.cart = [];
        window.currentShopZalo = "";
        window.currentShopName = "";

        window.addToCart = function(shopName, itemName, price, zaloPhone) {
            // Kiểm tra: Chỉ cho đặt món của 1 quán cùng lúc để tránh nhầm đơn Zalo
            if(window.cart.length > 0 && window.currentShopZalo !== zaloPhone) {
                alert(`Bạn đang chọn món của quán ${window.currentShopName}. Vui lòng chốt đơn hoặc xóa giỏ hàng trước khi đặt quán khác!`);
                return;
            }

            window.cart.push({ itemName, price });
            window.currentShopZalo = zaloPhone;
            window.currentShopName = shopName;
            updateCartUI();
        }

        function updateCartUI() {
            const cartBar = document.getElementById('cartBottomBar');
            if (window.cart.length > 0) {
                cartBar.classList.remove('translate-y-full');
                document.getElementById('cartCount').innerText = window.cart.length;
                document.getElementById('cartShopName').innerText = window.currentShopName;
                const total = window.cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('cartTotal').innerText = total.toLocaleString('vi-VN') + "đ";
            }
        }

        window.checkoutZalo = function() {
            if(window.cart.length === 0) return;
            
            let message = `*ĐƠN HÀNG TỪ ANCHAYSAIGON*\n`;
            message += `Quán: ${window.currentShopName}\n`;
            message += `------------------------\n`;
            
            let total = 0;
            window.cart.forEach((item, i) => {
                message += `${i + 1}. ${item.itemName} - ${item.price.toLocaleString('vi-VN')}đ\n`;
                total += item.price;
            });
            message += `------------------------\n*Tổng cộng: ${total.toLocaleString('vi-VN')}đ*\n\nNhờ quán lên đơn giúp mình nhé! Cảm ơn quán.`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://zalo.me/${window.currentShopZalo}?text=${encodedMessage}`, '_blank');
            
            // Hỏi khách có muốn xóa giỏ để đặt quán khác không
            if(confirm("Hệ thống đã chuyển bạn sang Zalo. Bạn có muốn xóa giỏ hàng hiện tại để đặt món quán khác không?")) {
                window.cart = [];
                window.currentShopZalo = "";
                document.getElementById('cartBottomBar').classList.add('translate-y-full');
            }
        }

        // Khởi động hệ thống
        loadCities();
        loadShops();
    </script>
</body>
</html>
