<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ăn Chay Sài Gòn - Đặt món chay qua Zalo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #22c55e; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <div id="homeView" class="block">
        <header class="bg-green-600 text-white p-4 sticky top-0 z-40 shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold"><i class="fa-solid fa-leaf mr-2"></i>Ăn Chay Sài Gòn</h1>
                <i class="fa-solid fa-bars text-xl cursor-pointer"></i>
            </div>
            
            <div class="flex gap-2 bg-white p-1 rounded-lg">
                <select id="citySelect" class="bg-transparent text-gray-700 outline-none border-r border-gray-300 px-2 text-sm max-w-[130px] truncate">
                    <option value="">Tất cả khu vực</option>
                </select>
                <input type="text" id="searchInput" placeholder="Tìm tên quán, món ăn..." class="w-full px-2 text-gray-700 outline-none text-sm">
                <button class="bg-green-500 text-white px-3 py-1 rounded-md"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </header>

        <div class="flex overflow-x-auto gap-3 p-4 bg-white shadow-sm hide-scroll" id="categoryTags">
            <button class="filter-btn active px-4 py-1 bg-green-100 text-green-700 rounded-full text-sm font-semibold whitespace-nowrap" data-keyword="">Tất cả</button>
            <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="cơm">Cơm</button>
            <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="bún">Bún / Phở</button>
            <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="lẩu">Lẩu chay</button>
            <button class="filter-btn px-4 py-1 bg-gray-100 text-gray-700 rounded-full text-sm whitespace-nowrap" data-keyword="gỏi">Gỏi / Cuốn</button>
        </div>

        <main class="p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800">Khám phá quán chay</h2>
                <span id="shopCount" class="text-sm text-gray-500">Đang tải...</span>
            </div>
            
            <div id="loading" class="flex justify-center items-center py-10">
                <div class="spinner"></div>
                <span class="ml-3 text-gray-500">Đang lấy dữ liệu...</span>
            </div>

            <div id="shopList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                </div>
        </main>
    </div>

    <div id="shopDetailView" class="hidden bg-gray-50 min-h-screen pb-20">
        <header class="bg-white p-4 sticky top-0 z-40 shadow-sm flex items-center border-b">
            <button onclick="closeShopDetail()" class="text-gray-600 hover:text-green-600 text-xl px-2 py-1 mr-3">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-bold text-gray-800 truncate flex-1" id="detailHeaderName">Tên quán</h1>
        </header>

        <div class="bg-white pb-4 mb-2 shadow-sm">
            <img id="detailImage" src="" alt="Cover" class="w-full h-56 object-cover">
            <div class="px-4 pt-4">
                <h2 id="detailName" class="text-2xl font-bold text-gray-800 mb-1">Tên quán</h2>
                <p id="detailAddress" class="text-gray-500 text-sm mb-3"><i class="fa-solid fa-location-dot mr-1"></i> Địa chỉ</p>
                <div class="flex gap-2 text-xs">
                    <span class="bg-green-100 text-green-700 px-2 py-1 rounded"><i class="fa-solid fa-clock mr-1"></i>Đang mở cửa</span>
                    <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded"><i class="fa-solid fa-star mr-1"></i>4.8 Đánh giá</span>
                </div>
            </div>
        </div>

        <div class="p-4 bg-white shadow-sm min-h-screen">
            <h3 class="font-bold text-lg text-gray-800 mb-4 border-b pb-2">Thực đơn đặt món</h3>
            <div id="detailMenuList" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="cartBottomBar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] transition-transform duration-300 transform translate-y-full flex justify-between items-center z-50 cursor-pointer" onclick="toggleCartModal()">
        <div class="flex items-center">
            <div class="relative mr-4">
                <i class="fa-solid fa-cart-shopping text-3xl text-green-600"></i>
                <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            <div>
                <p class="text-xs text-gray-500 mb-0.5">Tổng thanh toán</p>
                <p class="text-xl font-bold text-green-600 leading-none" id="cartTotalShort">0đ</p>
            </div>
        </div>
        <button class="bg-gray-100 text-gray-700 font-bold py-2 px-4 rounded-xl flex items-center">
            Xem đơn <i class="fa-solid fa-chevron-up ml-2 text-sm"></i>
        </button>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex-col justify-end transition-opacity">
        <div class="bg-white rounded-t-2xl p-4 w-full max-h-[80vh] flex flex-col transform transition-transform translate-y-full" id="cartModalContent">
            
            <div class="flex justify-between items-center border-b pb-3 mb-3">
                <div>
                    <h3 class="font-bold text-lg text-gray-800">Giỏ hàng của bạn</h3>
                    <p class="text-xs text-gray-500">Quán: <span id="cartModalShopName" class="font-semibold text-green-600"></span></p>
                </div>
                <button onclick="toggleCartModal(event)" class="text-gray-400 hover:text-gray-700 p-2 text-2xl"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div id="cartItemsList" class="overflow-y-auto flex-1 space-y-4 py-2"></div>

            <div class="border-t pt-4 mt-2">
                <div class="flex justify-between items-center font-bold text-lg mb-4">
                    <span class="text-gray-700">Tổng cộng:</span>
                    <span id="cartModalTotal" class="text-green-600 text-2xl">0đ</span>
                </div>
                <button onclick="checkoutZalo(event)" class="w-full bg-[#0068FF] hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-lg flex justify-center items-center shadow-md">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Gửi đơn qua Zalo
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr8_G-zkKsr7JrI-gXuE6xNIZErYWWiM8",
            authDomain: "anchaysaigon-bd874.firebaseapp.com",
            projectId: "anchaysaigon-bd874",
            storageBucket: "anchaysaigon-bd874.firebasestorage.app",
            messagingSenderId: "584356333421",
            appId: "1:584356333421:web:06a6fec664ef20d9263c64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allShops = []; 

        async function loadCities() {
            const citySelect = document.getElementById('citySelect');
            try {
                const q = query(collection(db, "locations"), orderBy("order"));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach((doc) => {
                    const city = doc.data();
                    citySelect.innerHTML += `<option value="${city.slug}">${city.name}</option>`;
                });
            } catch (error) { console.error("Lỗi tải thành phố:", error); }
        }

        async function loadShops() {
            try {
                const querySnapshot = await getDocs(collection(db, "shops"));
                allShops = [];
                // Quan trọng: Lưu ID của document để làm mã định danh mở Menu
                querySnapshot.forEach((doc) => allShops.push({ id: doc.id, ...doc.data() }));
                document.getElementById('loading').style.display = 'none';
                renderShops(allShops);
            } catch (error) { console.error("Lỗi:", error); }
        }

        // CHỈ RENDER THẺ QUÁN (KHÔNG RENDER MENU)
        function renderShops(shopsToRender) {
            const container = document.getElementById('shopList');
            document.getElementById('shopCount').innerText = `${shopsToRender.length} địa điểm`;
            container.innerHTML = '';

            shopsToRender.forEach(shop => {
                const card = `
                    <div onclick="openShopDetail('${shop.id}')" class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 pb-2 cursor-pointer hover:shadow-md transition">
                        <img src="${shop.image}" alt="${shop.name}" class="w-full h-40 object-cover">
                        <div class="px-4 py-3">
                            <h3 class="font-bold text-lg text-gray-800 truncate" title="${shop.name}">${shop.name}</h3>
                            <p class="text-gray-500 text-xs mt-1 mb-2 truncate"><i class="fa-solid fa-location-dot mr-1"></i> ${shop.address}</p>
                            <div class="border-t pt-2 flex justify-between items-center text-sm text-green-600 font-medium">
                                <span><i class="fa-solid fa-utensils mr-1"></i> Xem thực đơn</span>
                                <i class="fa-solid fa-chevron-right text-xs"></i>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // ==========================================
        // LOGIC CHUYỂN CẢNH (MỞ/ĐÓNG MENU QUÁN)
        // ==========================================
        window.openShopDetail = function(shopId) {
            const shop = allShops.find(s => s.id === shopId);
            if(!shop) return;

            // 1. Ẩn trang chủ, hiện chi tiết
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('shopDetailView').classList.remove('hidden');
            window.scrollTo(0, 0); // Cuộn lên đầu trang

            // 2. Điền thông tin quán
            document.getElementById('detailHeaderName').innerText = shop.name;
            document.getElementById('detailName').innerText = shop.name;
            document.getElementById('detailImage').src = shop.image;
            document.getElementById('detailAddress').innerText = shop.address;

            // 3. Render Menu của riêng quán này
            const menuContainer = document.getElementById('detailMenuList');
            menuContainer.innerHTML = '';
            
            if(shop.menu && shop.menu.length > 0) {
                shop.menu.forEach(item => {
                    menuContainer.innerHTML += `
                        <div class="flex justify-between items-center py-3 border-b border-gray-100 last:border-0">
                            <div class="flex-1 pr-4">
                                <h4 class="text-base font-medium text-gray-800">${item.name}</h4>
                                <p class="text-sm text-green-600 font-semibold mt-1">${item.price.toLocaleString('vi-VN')}đ</p>
                            </div>
                            <button onclick="addToCart('${shop.name}', '${item.name}', ${item.price}, '${shop.zalo_phone}')" 
                                    class="text-green-600 bg-green-50 px-4 py-2 rounded-lg border border-green-200 hover:bg-green-500 hover:text-white transition shadow-sm font-bold flex items-center">
                                <i class="fa-solid fa-plus mr-1 text-sm"></i> Thêm
                            </button>
                        </div>
                    `;
                });
            } else {
                menuContainer.innerHTML = '<p class="text-gray-500 italic">Quán đang cập nhật thực đơn...</p>';
            }
        }

        window.closeShopDetail = function() {
            document.getElementById('shopDetailView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
        }

        // --- LỌC DỮ LIỆU ---
        function filterData(keyword = '') {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const cityVal = document.getElementById('citySelect').value;
            const tagVal = keyword.toLowerCase();

            const filtered = allShops.filter(shop => {
                if (cityVal && shop.city !== cityVal) return false;
                let matchSearch = true;
                if (searchVal) {
                    const shopContent = (shop.name + " " + shop.address).toLowerCase();
                    const menuContent = shop.menu ? shop.menu.map(m => m.name).join(" ").toLowerCase() : "";
                    matchSearch = shopContent.includes(searchVal) || menuContent.includes(searchVal);
                }
                let matchTag = true;
                if (tagVal) {
                    const menuContent = shop.menu ? shop.menu.map(m => m.name).join(" ").toLowerCase() : "";
                    matchTag = menuContent.includes(tagVal) || shop.name.toLowerCase().includes(tagVal);
                }
                return matchSearch && matchTag;
            });
            renderShops(filtered);
        }
        document.getElementById('searchInput').addEventListener('input', () => filterData());
        document.getElementById('citySelect').addEventListener('change', () => filterData());
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-green-100', 'text-green-700', 'active');
                    b.classList.add('bg-gray-100', 'text-gray-700');
                });
                e.target.classList.remove('bg-gray-100', 'text-gray-700');
                e.target.classList.add('bg-green-100', 'text-green-700', 'active');
                filterData(e.target.dataset.keyword);
            });
        });

        // ==========================================
        // QUẢN LÝ GIỎ HÀNG 
        // ==========================================
        window.cart = [];
        window.currentShopZalo = "";
        window.currentShopName = "";

        window.addToCart = function(shopName, itemName, price, zaloPhone) {
            if(window.cart.length > 0 && window.currentShopZalo !== zaloPhone) {
                alert(`Bạn đang có món của quán [${window.currentShopName}] trong giỏ. Vui lòng đặt xong hoặc xóa giỏ hàng trước khi chọn quán khác nhé!`);
                return;
            }
            window.currentShopZalo = zaloPhone;
            window.currentShopName = shopName;

            let existingItem = window.cart.find(item => item.itemName === itemName);
            if(existingItem) {
                existingItem.quantity += 1;
            } else {
                window.cart.push({ itemName, price, quantity: 1 });
            }
            updateCartUI();
            
            // Hiệu ứng Toast nhỏ báo thêm thành công (Tùy chọn thêm)
            console.log(`Đã thêm ${itemName} vào giỏ`);
        }

        window.changeQuantity = function(index, delta) {
            window.cart[index].quantity += delta;
            if(window.cart[index].quantity <= 0) {
                window.cart.splice(index, 1);
            }
            if(window.cart.length === 0) {
                window.currentShopZalo = "";
                window.currentShopName = "";
                toggleCartModal(null, false);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartBar = document.getElementById('cartBottomBar');
            const listContainer = document.getElementById('cartItemsList');
            
            if (window.cart.length > 0) {
                cartBar.classList.remove('translate-y-full');
                document.getElementById('cartModalShopName').innerText = window.currentShopName;
                
                let totalItems = 0;
                let totalPrice = 0;
                listContainer.innerHTML = ''; 

                window.cart.forEach((item, index) => {
                    totalItems += item.quantity;
                    totalPrice += item.price * item.quantity;

                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <div class="flex-1 pr-3">
                                <h4 class="font-medium text-gray-800">${item.itemName}</h4>
                                <p class="text-green-600 font-semibold text-sm">${(item.price * item.quantity).toLocaleString('vi-VN')}đ</p>
                            </div>
                            <div class="flex items-center bg-white border rounded-lg overflow-hidden shadow-sm">
                                <button onclick="changeQuantity(${index}, -1)" class="px-3 py-1 text-gray-500 hover:bg-gray-100 active:bg-gray-200"><i class="fa-solid fa-minus text-xs"></i></button>
                                <span class="px-3 font-bold text-gray-700 min-w-[30px] text-center">${item.quantity}</span>
                                <button onclick="changeQuantity(${index}, 1)" class="px-3 py-1 text-green-600 hover:bg-green-50 active:bg-green-100"><i class="fa-solid fa-plus text-xs"></i></button>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('cartBadge').innerText = totalItems;
                document.getElementById('cartTotalShort').innerText = totalPrice.toLocaleString('vi-VN') + "đ";
                document.getElementById('cartModalTotal').innerText = totalPrice.toLocaleString('vi-VN') + "đ";
            } else {
                cartBar.classList.add('translate-y-full');
                toggleCartModal(null, false);
            }
        }

        window.toggleCartModal = function(event, forceState) {
            if(event) event.stopPropagation();
            const modal = document.getElementById('cartModal');
            const content = document.getElementById('cartModalContent');
            const isOpen = forceState !== undefined ? forceState : modal.classList.contains('hidden');
            
            if(isOpen && window.cart.length > 0) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => { content.classList.remove('translate-y-full'); }, 10);
            } else {
                content.classList.add('translate-y-full');
                setTimeout(() => { 
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            }
        }

        window.checkoutZalo = function(event) {
            if(event) event.stopPropagation();
            if(window.cart.length === 0) return;
            
            let message = `*ĐƠN HÀNG TỪ ANCHAYSAIGON*\nQuán: ${window.currentShopName}\n------------------------\n`;
            let total = 0;
            
            window.cart.forEach((item, i) => {
                message += `${i + 1}. [${item.quantity} phần] ${item.itemName} - ${(item.price * item.quantity).toLocaleString('vi-VN')}đ\n`;
                total += item.price * item.quantity;
            });
            
            message += `------------------------\n*Tổng cộng: ${total.toLocaleString('vi-VN')}đ*\n\nNhờ quán lên đơn giúp mình nhé! Cảm ơn quán.`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://zalo.me/${window.currentShopZalo}?text=${encodedMessage}`, '_blank');
            
            if(confirm("Hệ thống đã chuyển bạn sang Zalo. Bạn có muốn xóa giỏ hàng hiện tại không?")) {
                window.cart = [];
                updateCartUI();
            }
        }

        loadCities();
        loadShops();
    </script>
</body>
</html>
