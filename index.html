<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt Dữ liệu - Ăn Chay Sài Gòn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md text-center">
        <h1 class="text-2xl font-bold text-green-600 mb-2">Bơm Dữ Liệu Lên Firebase</h1>
        <p class="text-gray-600 mb-6 text-sm">Trang này sẽ tự động tạo danh mục 14 tỉnh thành vào Database của bạn.</p>
        
        <button id="uploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full shadow-md transition-all">
            🚀 Bấm vào đây để đẩy dữ liệu
        </button>

        <div id="logArea" class="mt-6 text-left bg-gray-50 p-4 border rounded h-48 overflow-y-auto text-sm font-mono text-gray-700">
            Đang chờ lệnh...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CẤU HÌNH CỦA BẠN ĐÃ ĐƯỢC TÍCH HỢP
        const firebaseConfig = {
            apiKey: "AIzaSyCr8_G-zkKsr7JrI-gXuE6xNIZErYWWiM8",
            authDomain: "anchaysaigon-bd874.firebaseapp.com",
            projectId: "anchaysaigon-bd874",
            storageBucket: "anchaysaigon-bd874.firebasestorage.app",
            messagingSenderId: "584356333421",
            appId: "1:584356333421:web:06a6fec664ef20d9263c64",
            measurementId: "G-ER6B839Y1G"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function log(msg, isError = false) {
            const color = isError ? 'text-red-600' : 'text-green-600';
            document.getElementById('logArea').innerHTML += `<div class="${color}">> ${msg}</div>`;
            const logBox = document.getElementById('logArea');
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Dữ liệu 14 tỉnh thành
        const locationsData = [
            { slug: "tphcm", name: "TP. Hồ Chí Minh", order: 1, districts: ["Quận 1", "Quận 3", "Quận 4", "Quận 5", "Quận 6", "Quận 7", "Quận 8", "Quận 10", "Quận 11", "Quận 12", "Tân Bình", "Bình Thạnh", "Phú Nhuận", "Gò Vấp", "Tân Phú", "Bình Tân", "TP Thủ Đức", "Bình Chánh", "Hóc Môn", "Nhà Bè"] },
            { slug: "hanoi", name: "Hà Nội", order: 2, districts: ["Ba Đình", "Hoàn Kiếm", "Tây Hồ", "Long Biên", "Cầu Giấy", "Đống Đa", "Hai Bà Trưng", "Hoàng Mai", "Thanh Xuân", "Hà Đông", "Nam Từ Liêm", "Bắc Từ Liêm"] },
            { slug: "danang", name: "Đà Nẵng", order: 3, districts: ["Hải Châu", "Thanh Khê", "Sơn Trà", "Ngũ Hành Sơn", "Liên Chiểu", "Cẩm Lệ", "Hòa Vang"] },
            { slug: "haiphong", name: "Hải Phòng", order: 4, districts: ["Hồng Bàng", "Ngô Quyền", "Lê Chân", "Hải An", "Kiến An", "Đồ Sơn", "Dương Kinh", "Thủy Nguyên"] },
            { slug: "ninhbinh", name: "Ninh Bình", order: 5, districts: ["TP. Ninh Bình", "Tam Điệp", "Nho Quan", "Gia Viễn", "Hoa Lư", "Yên Mô", "Yên Khánh", "Kim Sơn"] },
            { slug: "dalat", name: "Đà Lạt", order: 6, districts: ["Phường 1", "Phường 2", "Phường 8", "Phường 9", "Phường 10", "Phường 11", "Xã Trạm Hành", "Xã Xuân Thọ"] },
            { slug: "cantho", name: "Cần Thơ", order: 7, districts: ["Ninh Kiều", "Bình Thủy", "Cái Răng", "Ô Môn", "Thốt Nốt", "Phong Điền"] },
            { slug: "hoian", name: "Hội An", order: 8, districts: ["Minh An", "Cẩm Phô", "Sơn Phong", "Cẩm Châu", "Cẩm An", "Cửa Đại"] },
            { slug: "nhatrang", name: "Nha Trang", order: 9, districts: ["Lộc Thọ", "Tân Lập", "Phước Tiến", "Phước Hải", "Vĩnh Hải", "Vĩnh Nguyên"] },
            { slug: "phuquoc", name: "Phú Quốc", order: 10, districts: ["Dương Đông", "An Thới", "Hàm Ninh", "Cửa Cạn", "Gành Dầu", "Bãi Thơm"] },
            { slug: "sapa", name: "Sapa", order: 11, districts: ["Phường Sa Pa", "Phường Hàm Rồng", "Phường Ô Quý Hồ", "Xã Tả Van", "Xã Mường Hoa"] },
            { slug: "phanthiet", name: "Phan Thiết", order: 12, districts: ["Phú Thủy", "Thanh Hải", "Bình Hưng", "Hàm Tiến", "Mũi Né", "Tiến Thành"] },
            { slug: "quynhon", name: "Quy Nhơn", order: 13, districts: ["Lê Lợi", "Trần Phú", "Nguyễn Văn Cừ", "Ghềnh Ráng", "Nhơn Lý", "Nhơn Châu"] },
            { slug: "hue", name: "Huế", order: 14, districts: ["Vĩnh Ninh", "Phú Nhuận", "Đông Ba", "Thuận Thành", "Vĩ Dạ", "Hương Long"] }
        ];

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = "⏳ Đang đẩy dữ liệu...";
            log("Bắt đầu kết nối Firestore...");
            
            let successCount = 0;
            
            for (const city of locationsData) {
                try {
                    // Firebase: Lưu từng tỉnh thành vào collection 'locations'
                    await setDoc(doc(db, "locations", city.slug), city);
                    log(`✅ Đã thêm: ${city.name}`);
                    successCount++;
                } catch (error) {
                    log(`❌ Lỗi (${city.name}): ${error.message}`, true);
                    console.error(error);
                }
            }
            
            if (successCount === locationsData.length) {
                log("🎉 HOÀN TẤT! Đã đẩy toàn bộ 14 tỉnh thành lên Firebase thành công.");
                btn.innerText = "Đã thực hiện xong";
            } else {
                log("⚠️ Quá trình hoàn tất nhưng có lỗi. Hãy kiểm tra lại rule bảo mật Firestore của bạn.", true);
                btn.innerText = "Thử lại";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
